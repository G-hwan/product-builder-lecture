<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="번호연구소 운영자에게 문의, 제휴 제안, 오류 제보를 보낼 수 있는 페이지입니다.">
    <title>문의하기 | 번호연구소</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="index.html" aria-label="번호연구소 홈">번호연구소</a>
        <nav class="site-nav" aria-label="주요 메뉴">
            <a href="index.html#generator">번호 생성</a>
            <a href="index.html#guide">구매 가이드</a>
            <a href="privacy.html">개인정보</a>
        </nav>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="다크 모드로 전환">다크 모드</button>
    </header>

    <main class="narrow-page">
        <section class="section-band">
            <p class="eyebrow">Contact</p>
            <h1>문의하기</h1>
            <p class="lead">사이트 오류, 콘텐츠 제안, 제휴 문의를 보내주세요. 광고 클릭을 유도하는 제안이나 사용자에게 오해를 줄 수 있는 협업은 받지 않습니다.</p>

            <form class="contact-form" action="https://formspree.io/f/meenlnaj" method="POST">
                <div class="form-group">
                    <label for="category">문의 유형 <span class="required">*</span></label>
                    <select id="category" name="category" required>
                        <option value="">선택해주세요</option>
                        <option value="site-feedback">사이트 의견</option>
                        <option value="bug-report">오류 제보</option>
                        <option value="partnership">제휴 문의</option>
                        <option value="privacy">개인정보 문의</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="name">이름 <span class="required">*</span></label>
                    <input type="text" id="name" name="name" placeholder="홍길동" autocomplete="name" required>
                </div>

                <div class="form-group">
                    <label for="email">이메일 <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="message">문의 내용 <span class="required">*</span></label>
                    <textarea id="message" name="message" placeholder="문의 내용을 구체적으로 적어주세요." required></textarea>
                </div>

                <p class="fine-print">폼을 제출하면 입력한 내용이 문의 처리를 위해 Formspree로 전송됩니다. 자세한 내용은 개인정보처리방침을 확인해주세요.</p>
                <button class="button primary full-width" type="submit">문의 보내기</button>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <div>
            <strong>번호연구소</strong>
            <p>사용자에게 명확하고 유용한 정보를 제공하는 것을 우선합니다.</p>
        </div>
        <nav aria-label="하단 메뉴">
            <a href="index.html">홈</a>
            <a href="privacy.html">개인정보처리방침</a>
            <a href="terms.html">이용약관</a>
        </nav>
    </footer>

    <script src="main.js"></script>
</body>
</html>
